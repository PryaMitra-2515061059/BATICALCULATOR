<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator IPK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <header class="header">
        <h1>Kalkulator IPK BATIC</h1>
        <p>Hitung IP Semester dan IPK secara otomatis</p>
    </header>

    <section class="dashboard">

        <div class="dashboard-card">

            <h2>
                <i class="fa-solid fa-chart-line"></i>
                Hasil Perhitungan
            </h2>

            <div id="semesterSummary" class="summary-grid">

        </div>

            <div id="ipkResult" class="ipk-card">

                <div class="summary-title">
                    IPK Keseluruhan
                </div>

                <div class="summary-ip">
                    0.00
                </div>

                <div class="summary-sks">
                    0 SKS
                </div>

            </div>

        </div>

    </section>

    <div class="button-area">

        <button id="addSemesterBtn">
            <i class="fa-solid fa-plus"></i>
            Tambah Semester
        </button>

    </div>

    <main id="semesterContainer">

    </main>

    <template id="semesterTemplate">

        <section class="semester-card">

            <div class="semester-header">

                <h2 class="semester-title">
                    Semester 1
                </h2>

                <button class="delete-semester">
                    <i class="fa-solid fa-trash"></i>
                </button>

            </div>


            <div class="table-responsive">

                <table>

                    <thead>

                    <tr>

                        <th style="width:45%">Nama Mata Kuliah</th>
                        <th>Nilai</th>
                        <th>SKS</th>
                        <th>Aksi</th>

                    </tr>

                    </thead>

                    <tbody class="course-list">

                    </tbody>

                </table>

            </div>


            <div class="semester-action">

                <button class="add-course">

                    <i class="fa-solid fa-book-medical"></i>

                    Tambah Mata Kuliah

                </button>

            </div>


            <div class="semester-footer">

                <h3>

                    IP Semester :
                    <span class="semester-gpa">0.00</span>

                </h3>

                <h4>

                    Total SKS :
                    <span class="semester-sks">0</span>

                </h4>

            </div>

        </section>

    </template>

    <template id="courseTemplate">

        <tr>

            <td>

                <input
                    type="text"
                    class="course-name"
                    placeholder="Masukkan Nama Mata Kuliah"
                >

            </td>

            <td>

                <select class="course-grade">

                    <option value="4">A</option>
                    <option value="3.5">B+</option>
                    <option value="3">B</option>
                    <option value="2.5">C+</option>
                    <option value="2">C</option>
                    <option value="1">D</option>
                    <option value="0">E</option>

                </select>

            </td>

            <td>

                <select class="course-sks">

                    <option>1</option>
                    <option selected>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>

                </select>

            </td>

            <td>

                <button class="delete-course">

                    <i class="fa-solid fa-trash"></i>

                </button>

            </td>

        </tr>

    </template>

    <footer>

        <p>
            © 2026 Kalkulator IPK | Dibuat dengan sepenuh Hati dan Kasih Sayang
        </p>

    </footer>

    <script src="script.js"></script>

</body>
</html>
